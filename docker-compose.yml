
networks:
  ticket-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  hf_cache:

services:

  postgres:
    image: postgres:16-alpine
    container_name: ticket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticket_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticket_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ticket_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - ticket-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticket_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticket_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ticket-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: ticket_qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-qdrant_secret}
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - ticket-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ticket_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_pass_123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ticket-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket_backend
    restart: unless-stopped
    env_file: .env
    environment:
      HF_HOME: /tmp/hf_cache
      TRANSFORMERS_CACHE: /tmp/hf_cache
      SENTENCE_TRANSFORMERS_HOME: /tmp/hf_cache/sentence_transformers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - hf_cache:/tmp/hf_cache
    ports:
      - "8000:8000"
    networks:
      - ticket-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket_worker
    restart: unless-stopped
    env_file: .env
    environment:
      HF_HOME: /tmp/hf_cache
      TRANSFORMERS_CACHE: /tmp/hf_cache
      SENTENCE_TRANSFORMERS_HOME: /tmp/hf_cache/sentence_transformers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - hf_cache:/tmp/hf_cache
    networks:
      - ticket-net
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q ticket_processing,embedding,notification,analytics

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - worker
    volumes:
      - ./backend:/app
    networks:
      - ticket-net
    command: celery -A app.workers.celery_app beat --loglevel=info

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket_flower
    restart: unless-stopped
    env_file: .env
    depends_on:
      - worker
    ports:
      - "5555:5555"
    networks:
      - ticket-net
    command: celery -A app.workers.celery_app flower --port=5555

  nginx:
    image: nginx:1.25-alpine
    container_name: ticket_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ticket-net

  prometheus:
    image: prom/prometheus:latest
    container_name: ticket_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - ticket-net

  grafana:
    image: grafana/grafana:latest
    container_name: ticket_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_pass}
    ports:
      - "3001:3000"
    networks:
      - ticket-net


